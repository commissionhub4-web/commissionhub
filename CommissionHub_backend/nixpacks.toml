[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "python311Packages.setuptools", "python311Packages.wheel"]

[phases.install]
cmds = ["python -m venv .venv && .venv/bin/python -m pip install --upgrade pip setuptools wheel && .venv/bin/python -m pip install --no-cache-dir -r requirements.txt"]

[start]
cmd = ".venv/bin/python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT"
